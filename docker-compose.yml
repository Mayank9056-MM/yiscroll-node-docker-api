
services:
  api:
    build: .
    container_name: yiscroll-api
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/yiscroll
    restart: always

  mongo:
    image: mongo:latest
    container_name: yiscroll-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes: 
  mongo-data:
